# notes:
# - python >= 3.7 required for datetime.fromisoformat
# - we have chosen to make the following dependencies optional:
#   - astropy
#   - requests
# - the conda-forge deps analyzer reports cython as missing, but it's appropriately
#   marked as build-time-only

{% set name = "toasty" %}
{% set version = "0.20.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/toasty-{{ version }}.tar.gz
  sha256: d1a17206fc5dad1c68ba7f55ff4261915ebc4a2d14603c78a44a86ab94136fad

build:
  number: 1
  entry_points:
    - toasty=toasty.cli:entrypoint
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - cython                              # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
  host:
    - cython
    - numpy
    - pip
    - setuptools
    - python
  run:
    - filelock >=3
    - pillow >=7.0
    - python
    - pyyaml >=5.0
    - reproject >=0.8
    - shapely
    - tqdm >=4.0
    - wwt_data_formats >=0.12

test:
  imports:
    - toasty
  commands:
    - pip check
    - toasty --help
    - pytest --pyargs toasty
  requires:
    - astropy-base
    - healpy  # [not win]
    - openexr-python
    - pip
    - pytest

about:
  home: https://toasty.readthedocs.io/
  summary: Generate TOAST image tile pyramids from existing image data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pkgw
